<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>FIFA World Cup 2026 – Group Standings</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;600;700&display=swap');
  * { margin:0; padding:0; box-sizing:border-box; }
  :root {
    --gold:#C9A84C; --gold2:#F0C94A; --navy:#0A0E1A; --navy3:#1A2235;
    --gray:#6B7280; --white:#FFFFFF; --green:#22C55E; --red:#EF4444; --amber:#F59E0B;
  }
  html,body { width:1920px; height:1080px; overflow:hidden; background:var(--navy); font-family:'Inter',sans-serif; color:var(--white); }

  header { display:flex; align-items:center; gap:20px; padding:10px 32px; background:linear-gradient(135deg,#0A0E1A,#1A2235,#0D1B3E); border-bottom:2px solid var(--gold); height:80px; }
  .logo-placeholder { width:56px; height:56px; border:2px dashed var(--gold); border-radius:8px; display:flex; align-items:center; justify-content:center; font-size:9px; color:var(--gold); text-align:center; line-height:1.3; padding:4px; flex-shrink:0; }
  header h1 { font-family:'Bebas Neue',sans-serif; font-size:34px; letter-spacing:3px; color:var(--gold2); line-height:1; }
  header p  { font-size:11px; color:var(--gray); letter-spacing:2px; text-transform:uppercase; margin-top:3px; }
  .header-right { margin-left:auto; text-align:right; }
  .clock { font-family:'Bebas Neue',sans-serif; font-size:26px; color:var(--white); letter-spacing:2px; }
  #statusBar { font-size:10px; color:var(--gray); margin-top:4px; }
  #statusBar.loading { color:var(--gold); }
  #statusBar.error   { color:var(--red); }

  .groups-container { padding:10px 28px 8px; height:1000px; display:grid; grid-template-columns:repeat(6,1fr); grid-template-rows:repeat(2,1fr); gap:10px; }

  .group-card { background:var(--navy3); border:1px solid #1F2937; border-radius:10px; overflow:hidden; display:flex; flex-direction:column; }
  .group-title { background:linear-gradient(90deg,#1A2235,#0D1B3E); padding:6px 12px; display:flex; align-items:center; justify-content:space-between; border-bottom:1px solid #2D3748; }
  .group-name { font-family:'Bebas Neue',sans-serif; font-size:18px; letter-spacing:3px; color:var(--gold2); }
  .group-games { font-size:9px; color:var(--gray); letter-spacing:1px; }

  .standings-table { flex:1; width:100%; border-collapse:collapse; }
  .standings-table thead tr { border-bottom:1px solid #2D3748; }
  .standings-table thead th { font-size:8px; font-weight:700; letter-spacing:1.5px; color:var(--gray); text-transform:uppercase; padding:4px 6px; text-align:center; }
  .standings-table thead th.th-team { text-align:left; padding-left:10px; width:55%; }
  .standings-table tbody tr { border-bottom:1px solid rgba(255,255,255,0.04); }
  .standings-table tbody tr:last-child { border-bottom:none; }
  .standings-table tbody tr.auto-qualify { background:rgba(34,197,94,0.06); border-left:3px solid var(--green); }
  .standings-table tbody tr.possible-qualify { background:rgba(245,158,11,0.06); border-left:3px solid var(--amber); }
  .standings-table tbody tr.eliminated { opacity:0.5; border-left:3px solid transparent; }
  .standings-table td { padding:6px 6px; font-size:11px; text-align:center; vertical-align:middle; }
  .td-team { text-align:left !important; padding-left:8px !important; }
  .team-cell { display:flex; align-items:center; gap:6px; }
  .pos-num { font-size:9px; color:var(--gray); width:10px; text-align:center; flex-shrink:0; }
  .flag-sm { font-size:16px; line-height:1; }
  .team-nm { font-size:11px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; max-width:90px; }
  .pts-cell { font-family:'Bebas Neue',sans-serif; font-size:18px; color:var(--gold2); letter-spacing:1px; }
  .gd-pos { color:var(--green); }
  .gd-neg { color:var(--red); }
  .gd-zero { color:var(--gray); }

  .qual-key { display:flex; gap:12px; padding:5px 10px; border-top:1px solid #2D3748; background:rgba(0,0,0,0.2); }
  .qual-key-item { display:flex; align-items:center; gap:4px; font-size:8px; color:var(--gray); letter-spacing:0.5px; }
  .qual-dot { width:6px; height:6px; border-radius:1px; }
</style>
</head>
<body>
<header>
  <div class="logo-placeholder">ADD<br>fifa_logo<br>.jpg</div>
  <div>
    <h1>FIFA World Cup 2026 · Group Standings</h1>
    <p>Group Stage: June 11 – June 27, 2026 · 48 Teams · 12 Groups</p>
  </div>
  <div class="header-right">
    <div class="clock" id="clock">--:--</div>
    <div id="statusBar" class="loading">Loading standings…</div>
  </div>
</header>
<div class="groups-container" id="groupsContainer">
</div>

<script>
/* ── SEED DATA (team flags + names; stats filled by AI) ── */
const GROUP_SEEDS = {
  A: [ {f:"🇲🇽",n:"Mexico"}, {f:"🇰🇷",n:"South Korea"}, {f:"🇨🇿",n:"Czechia"}, {f:"🇿🇦",n:"South Africa"} ],
  B: [ {f:"🇨🇦",n:"Canada"}, {f:"🇧🇦",n:"Bosnia-Herz."}, {f:"🇶🇦",n:"Qatar"}, {f:"🇨🇭",n:"Switzerland"} ],
  C: [ {f:"🇧🇷",n:"Brazil"}, {f:"🇲🇦",n:"Morocco"}, {f:"🇭🇹",n:"Haiti"}, {f:"🏴󠁧󠁢󠁳󠁣󠁴󠁿",n:"Scotland"} ],
  D: [ {f:"🇺🇸",n:"USA"}, {f:"🇦🇺",n:"Australia"}, {f:"🇹🇷",n:"Türkiye"}, {f:"🇵🇾",n:"Paraguay"} ],
  E: [ {f:"🇩🇪",n:"Germany"}, {f:"🇨🇮",n:"Ivory Coast"}, {f:"🇪🇨",n:"Ecuador"}, {f:"🇨🇼",n:"Curaçao"} ],
  F: [ {f:"🇳🇱",n:"Netherlands"}, {f:"🇯🇵",n:"Japan"}, {f:"🇸🇪",n:"Sweden"}, {f:"🇹🇳",n:"Tunisia"} ],
  G: [ {f:"🇧🇪",n:"Belgium"}, {f:"🇪🇬",n:"Egypt"}, {f:"🇮🇷",n:"Iran"}, {f:"🇳🇿",n:"New Zealand"} ],
  H: [ {f:"🇪🇸",n:"Spain"}, {f:"🇺🇾",n:"Uruguay"}, {f:"🇸🇦",n:"Saudi Arabia"}, {f:"🇨🇻",n:"Cape Verde"} ],
  I: [ {f:"🇫🇷",n:"France"}, {f:"🇸🇳",n:"Senegal"}, {f:"🇮🇶",n:"Iraq"}, {f:"🇳🇴",n:"Norway"} ],
  J: [ {f:"🇦🇷",n:"Argentina"}, {f:"🇩🇿",n:"Algeria"}, {f:"🇦🇹",n:"Austria"}, {f:"🇯🇴",n:"Jordan"} ],
  K: [ {f:"🇵🇹",n:"Portugal"}, {f:"🇨🇴",n:"Colombia"}, {f:"🇨🇩",n:"DR Congo"}, {f:"🇺🇿",n:"Uzbekistan"} ],
  L: [ {f:"🏴󠁧󠁢󠁥󠁮󠁧󠁿",n:"England"}, {f:"🇭🇷",n:"Croatia"}, {f:"🇬🇭",n:"Ghana"}, {f:"🇵🇦",n:"Panama"} ],
};

/* live standings filled by AI; default zeros */
let standings = {};
Object.keys(GROUP_SEEDS).forEach(g => {
  standings[g] = GROUP_SEEDS[g].map(t => ({...t, gp:0, w:0, d:0, l:0, gf:0, ga:0, gd:0, pts:0}));
});

/* ═══════════════════════════════════════════════════════
   AI STANDINGS POLL
═══════════════════════════════════════════════════════ */
async function callAPI(prompt) {
  const SYSTEM = "You are a JSON-only API. Your entire response must be a single valid JSON object. " +
    "Start with { and end with }. No text before, no text after, no markdown, no code fences, no explanation.";
  const res = await fetch("https://fifa-proxy.nancyamedeo.workers.dev", {
    method: "POST",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify({
      model: "claude-sonnet-4-6",
      max_tokens: 3000,
      system: SYSTEM,
      tools: [{ type: "web_search_20250305", name: "web_search" }],
      messages: [{ role: "user", content: prompt }]
    })
  });
  if (!res.ok) { const err = await res.text(); throw new Error("API " + res.status + ": " + err.slice(0,200)); }
  const data = await res.json();
  const text = data.content.filter(b => b.type === "text").map(b => b.text).join("");
  console.log("Raw API response:", text.slice(0, 400));
  const m = text.match(/\{[\s\S]*\}/);
  if (!m) throw new Error("No JSON object in response: " + text.slice(0, 200));
  return JSON.parse(m[0]);
}

async function fetchStandings() {
  setStatus("Fetching latest standings…", "loading");
  try {
    const today = new Date().toLocaleDateString('en-US',{month:'long',day:'numeric',year:'numeric'});
    const prompt = "Today is " + today + ". Search for the current 2026 FIFA World Cup group stage standings. " +
      "Return a JSON object with keys A through L. Each key maps to an array of 4 teams sorted by standings (pts desc, gd desc, gf desc). " +
      "Each team: {\"name\":\"Mexico\",\"gp\":1,\"w\":1,\"d\":0,\"l\":0,\"gf\":2,\"ga\":0,\"gd\":2,\"pts\":3} " +
      "Use zeros for groups where no matches have been played yet.";

    const parsed = await callAPI(prompt);

    Object.keys(parsed).forEach(g => {
      if (!GROUP_SEEDS[g]) return;
      standings[g] = parsed[g].map(t => {
        const seed = GROUP_SEEDS[g].find(s => s.n.toLowerCase().includes(t.name.toLowerCase().split(" ")[0].toLowerCase())) || {f:"\ud83c\udff3"};
        return { f: seed.f, n: t.name, gp:t.gp, w:t.w, d:t.d, l:t.l, gf:t.gf, ga:t.ga, gd:t.gd, pts:t.pts };
      });
    });

    const now = new Date();
    setStatus("Updated " + now.toLocaleTimeString() + " · Next in 1 hr", "");
  } catch(e) {
    console.error("Standings fetch error:", e);
    setStatus("Update failed — showing last data", "error");
  }
  renderStandings();
}

/* ── RENDER ── */
function rowClass(pos, gamesPlayed) {
  if (gamesPlayed === 0) return "";
  if (pos <= 2) return "auto-qualify";
  if (pos === 3) return "possible-qualify";
  return "eliminated";
}

function gdStr(gd) {
  return gd === 0 ? "0" : gd > 0 ? `+${gd}` : `${gd}`;
}

function buildGroupCard(name, teams) {
  const totalGP = teams.reduce((s,t) => s+t.gp, 0);
  const rows = teams.map((t, i) => {
    const cls = rowClass(i+1, totalGP);
    const gc = t.gd > 0 ? "gd-pos" : t.gd < 0 ? "gd-neg" : "gd-zero";
    return `<tr class="${cls}">
      <td class="td-team"><div class="team-cell">
        <span class="pos-num">${i+1}</span>
        <span class="flag-sm">${t.f}</span>
        <span class="team-nm">${t.n}</span>
      </div></td>
      <td>${t.gp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td>
      <td>${t.gf}</td><td>${t.ga}</td>
      <td class="${gc}">${gdStr(t.gd)}</td>
      <td class="pts-cell">${t.pts}</td>
    </tr>`;
  }).join("");

  return `<div class="group-card">
    <div class="group-title">
      <span class="group-name">GROUP ${name}</span>
      <span class="group-games">MD${totalGP>0?Math.ceil(totalGP/2):0}/3</span>
    </div>
    <table class="standings-table">
      <thead><tr>
        <th class="th-team">Team</th>
        <th title="Played">GP</th><th>W</th><th>D</th><th>L</th>
        <th>GF</th><th>GA</th><th>GD</th><th>PTS</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
    <div class="qual-key">
      <div class="qual-key-item"><div class="qual-dot" style="background:var(--green)"></div>Auto (Top 2)</div>
      <div class="qual-key-item"><div class="qual-dot" style="background:var(--amber)"></div>Possible 3rd</div>
    </div>
  </div>`;
}

function renderStandings() {
  const c = document.getElementById("groupsContainer");
  c.innerHTML = Object.entries(standings).map(([name, teams]) => buildGroupCard(name, teams)).join("");
}

function setStatus(msg, cls) {
  const el = document.getElementById("statusBar");
  el.textContent = msg; el.className = cls || "";
}

function updateClock() {
  const n = new Date();
  document.getElementById("clock").textContent =
    n.getHours().toString().padStart(2,"0") + ":" + n.getMinutes().toString().padStart(2,"0");
}

/* render zeros immediately then fetch */
renderStandings();
fetchStandings();
setInterval(fetchStandings, 60 * 60 * 1000);
setTimeout(() => location.reload(), 15 * 60 * 1000);
updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
